spring.application.name=tp-securite-audit
server.port=8080

spring.datasource.url=jdbc:h2:mem:clinicdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Jamais exposer la console H2 en production, mais pour les besoins du TP, on l'active
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Afficher les messages d'erreur détaillés pour faciliter le debug, mais à éviter en production
server.error.include-stacktrace=always
server.error.include-message=always
