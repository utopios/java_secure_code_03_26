# =============================================================================
# APPLICATION PROPERTIES - VERSION SECURISEE
# =============================================================================

# --- Serveur ---
server.port=8080

# --- Base de donnees H2 ---
spring.datasource.url=jdbc:h2:mem:patientdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORRECTION Securite : H2 console DESACTIVEE
# AVANT: spring.h2.console.enabled=true
#   => Expose une console d'administration de la BDD accessible sans auth
# APRES: console desactivee en production
spring.h2.console.enabled=false

# --- Gestion des erreurs ---
# CORRECTION Securite : stacktrace NON exposee au client
# AVANT: server.error.include-stacktrace=always
#   => Les stacktraces revelent des details internes (versions, classes, chemins)
# APRES: jamais de stacktrace dans les reponses HTTP
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# --- Cle de chiffrement AES-256 (32 octets en Base64) ---
# CORRECTION : cle externalisee, pas codee en dur dans le code Java
# En production : utiliser une variable d'environnement ou un vault
# Exemple : export APP_CRYPTO_SECRET_KEY=...
app.crypto.secret-key=${APP_CRYPTO_SECRET_KEY:dGhpc0lzQVNlY3VyZUtleUZvckFFUzI1NkVuY3J5cHQ=}

# --- Logging ---
# Ne pas loguer les donnees sensibles
logging.level.root=INFO
logging.level.com.example.tpcleancode=INFO
logging.level.org.springframework.security=WARN
